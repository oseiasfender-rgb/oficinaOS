<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>OficinaOS</title>

<style>
/* RESET */
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}

/* LAYOUT */
body{
  display:flex;
  height:100vh;
  overflow:auto;
  background:#0f172a;
  color:#fff;
}

/* SIDEBAR */
.sidebar{
  width:220px;
  background:#020617;
  padding:20px;
}

.sidebar button{
  width:100%;
  margin-bottom:10px;
  padding:10px;
  cursor:pointer;
}

/* MAIN */
.main{
  flex:1;
  padding:20px;
  overflow:auto;
}

/* PANELS */
.panel{
  display:none;
}

.panel.active{
  display:block;
}

/* INPUT PADRÃO */
.input{
  padding:8px;
  margin-bottom:10px;
  width:100%;
}

.card{
  background:#1e293b;
  padding:15px;
  border-radius:8px;
  margin-bottom:10px;
}
</style>
</head>
<body>

<div class="sidebar">
  <button onclick="UI.show('dashboard')">Dashboard</button>
  <button onclick="UI.show('financeiro')">Financeiro</button>
  <button onclick="UI.show('agenda')">Agenda</button>
</div>

<div class="main">

  <div id="dashboard" class="panel active">
    <h1>Dashboard</h1>
    <div class="card" id="dashResumo"></div>
  </div>

  <div id="financeiro" class="panel">
    <h1>Financeiro</h1>

    <input id="desc" class="input" placeholder="Descrição">
    <input id="valor" class="input" type="number" placeholder="Valor">

    <button onclick="Financeiro.add()">Adicionar</button>

    <div id="listaFinanceiro"></div>
  </div>

  <div id="agenda" class="panel">
    <h1>Agenda</h1>
    <button onclick="Agenda.prev()">←</button>
    <span id="mesAtual"></span>
    <button onclick="Agenda.next()">→</button>

    <div id="calendario"></div>
  </div>

</div>
