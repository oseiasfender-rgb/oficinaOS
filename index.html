<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OficinaOS</title>

<style>

/* ===== BASE VISUAL CORRIGIDA ===== */

body {
  font-family: Arial, sans-serif;
  background: #fffdf9;
  color: #1a0e04;
}

/* PAINÉIS */
.panel {
  display: none;
}

.panel.active {
  display: flex !important;
  visibility: visible !important;
  opacity: 1 !important;
}

/* LAYOUT */
.container {
  display: flex;
  gap: 20px;
}

/* COLUNAS */
.left {
  flex: 2;
}

.right {
  flex: 1;
  background: #ffffff;
  border: 1px solid #e0c2a2;
  padding: 15px;
}

/* INPUTS */
input, select, textarea {
  width: 100%;
  padding: 8px;
  margin: 5px 0;
  background: #fffdf9;
  border: 1px solid #c9a27a;
  color: #1a0e04;
}

/* BOTÕES */
button {
  padding: 10px;
  margin-top: 5px;
  cursor: pointer;
}

/* TÍTULOS */
h2, h3 {
  color: #2c1a08;
}

/* SCROLL VISÍVEL */
::-webkit-scrollbar {
  width: 8px;
}
::-webkit-scrollbar-thumb {
  background: #b8621a;
}

</style>
</head>

<body>

<h1>OficinaOS</h1>

<div class="container">

<!-- ================= LEFT ================= -->
<div class="left">

<!-- IDENTIFICAÇÃO -->
<h2>Identificação do Serviço</h2>

<select id="prioridade">
  <option>Normal</option>
  <option>🚨 Urgente</option>
  <option>📅 Programado</option>
</select>

<!-- MATERIAIS -->
<h2>Materiais</h2>
<input type="number" id="materiais" placeholder="Valor materiais">

<!-- PEÇAS -->
<h2>Peças Usadas & Recuperadas</h2>
<input type="number" id="pecas" placeholder="Valor peças">

<!-- SERVIÇOS -->
<h2>Serviços</h2>
<input type="number" id="servicos" placeholder="Valor serviços">

<!-- EXTRAS -->
<h2>Extras & Ajustes</h2>
<input type="number" id="extras" placeholder="Valor extras">

</div>

<!-- ================= RIGHT ================= -->
<div class="right">

<h2>Resumo do Orçamento</h2>

<p><strong>Prioridade:</strong> <span id="res-prioridade">Normal</span></p>

<p>Materiais: R$ <span id="res-materiais">0</span></p>
<p>Peças: R$ <span id="res-pecas">0</span></p>
<p>Serviços: R$ <span id="res-servicos">0</span></p>
<p>Extras: R$ <span id="res-extras">0</span></p>

<hr>

<h3>TOTAL: R$ <span id="total">0</span></h3>

</div>

</div>

<script>

/* ===== LÓGICA CORRIGIDA ===== */

const campos = ["materiais","pecas","servicos","extras"];

campos.forEach(id => {
  document.getElementById(id).addEventListener("input", calcular);
});

document.getElementById("prioridade")
  .addEventListener("change", atualizarPrioridade);

function calcular(){

  let materiais = Number(materiaisInput());
  let pecas = Number(pecasInput());
  let servicos = Number(servicosInput());
  let extras = Number(extrasInput());

  let total = materiais + pecas + servicos + extras;

  atualizarResumo(materiais, pecas, servicos, extras, total);
}

function materiaisInput(){ return document.getElementById("materiais").value || 0 }
function pecasInput(){ return document.getElementById("pecas").value || 0 }
function servicosInput(){ return document.getElementById("servicos").value || 0 }
function extrasInput(){ return document.getElementById("extras").value || 0 }

function atualizarResumo(m,p,s,e,total){
  document.getElementById("res-materiais").innerText = m;
  document.getElementById("res-pecas").innerText = p;
  document.getElementById("res-servicos").innerText = s;
  document.getElementById("res-extras").innerText = e;
  document.getElementById("total").innerText = total.toFixed(2);
}

function atualizarPrioridade(){
  const valor = document.getElementById("prioridade").value;
  document.getElementById("res-prioridade").innerText = valor;
}

/* INIT */
calcular();

</script>

</body>
</html>
