<style>
html{height:100%;overflow:hidden;}

:root {
  --steel: #f8f6f3; --steel-mid: #ffffff; --steel-light: #f0ece6; --steel-card: #ffffff;
  --chrome: #2c1a08; --chrome-bright: #1a0e04; --text: #2c1a08; --muted: #5a3a1a; --dim: #7a5030;
  --gold: #b8621a; --gold-light: #d4782a; --gold-dim: #e8c090; --copper: #9a4e12; --amber: #e09030;
  --green: #16a34a; --red: #dc2626; --blue: #1d6fa4; --orange: #d97706; --purple: #7c3aed; --teal: #0d9488;
  --border: rgba(100,60,20,0.12); --border-gold: rgba(184,98,26,0.35);
}

*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Lato',sans-serif;background:#f8f6f3;color:#2c1a08;height:100vh;height:100dvh;max-height:100vh;max-height:100dvh;overflow:hidden;font-size:15px;display:flex;flex-direction:column;}

/* === TOPBAR, NAV, ESTILOS ORIGINAIS (mantidos) === */
.topbar{position:relative;z-index:20;display:flex;align-items:center;justify-content:space-between;padding:0 1.5rem;height:60px;border-bottom:1px solid var(--border);background:linear-gradient(180deg,#ffffff 0%,#faf5ee 100%);box-shadow:0 2px 12px rgba(150,80,20,0.12);flex-shrink:0;}
.brand{display:flex;align-items:center;gap:0.9rem;}
.nav-tabs{display:flex;gap:0.2rem;align-items:center;flex-shrink:0;}
.nav-tab{display:flex;align-items:center;gap:0.5rem;padding:0.5rem 1.2rem;border-radius:5px;cursor:pointer;transition:all 0.2s;border:1px solid transparent;font-size:0.84rem;color:var(--muted);background:none;font-weight:400;}
.nav-tab.active{background:linear-gradient(135deg,rgba(200,118,42,0.15),rgba(200,80,20,0.08));border-color:var(--border-gold);color:var(--gold);font-weight:700;}

/* ====================== CORREÇÕES CRÍTICAS ====================== */
/* Motor de Abas - Correção definitiva */
.panel {
  display: none;
}

.panel.active {
  display: flex !important;
  flex-direction: column;
  flex: 1;
  min-height: 0;
  overflow-y: auto;
  overflow-x: hidden;
}

/* Resumo do Orçamento (coluna direita) */
.orc-right,
.fin-summary {
  display: flex !important;
  flex-direction: column;
  min-width: 300px;
  overflow-y: auto;
}

/* Slider visível */
input[type="range"] {
  width: 100%;
  height: 6px;
  background: #ccc;
  accent-color: #b8621a;
  border-radius: 3px;
  outline: none;
  cursor: pointer;
}

/* Limpeza */
color: #2c1a08;
/* ====================== FIM DAS CORREÇÕES ====================== */

/* O restante do seu CSS original continua aqui (mantido integralmente) */
.fin-body{display:grid;grid-template-columns:1fr 1fr 340px;flex:1;min-height:0;overflow:auto;background:#f8f4ee;}
.orc-layout{display:grid;grid-template-columns:1fr 360px;width:100%;height:100%;min-height:0;overflow:hidden;}

<body>

<!-- === HTML ORIGINAL (mantido) === -->
<div class="topbar">
  <!-- seu topbar original -->
</div>

<div class="nav-tabs">
  <div class="nav-tab active" onclick="showTab('mod-financeiro')">Financeiro</div>
  <div class="nav-tab" onclick="showTab('mod-orcamento')">Orçamento</div>
  <div class="nav-tab" onclick="showTab('mod-agenda')">Agenda</div>
  <!-- demais abas... -->
</div>

<!-- Abas -->
<div id="mod-financeiro" class="panel active">
  <!-- conteúdo do financeiro -->
</div>

<div id="mod-orcamento" class="panel">
  <!-- conteúdo do orçamento -->
</div>

<div id="mod-agenda" class="panel">
  <!-- conteúdo da agenda / calendário -->
  <div class="cal-nav">
    <button onclick="prevMonth()">← Anterior</button>
    <h3 id="calMonth">Mês Atual</h3>
    <button onclick="nextMonth()">Próximo →</button>
  </div>
</div>

<!-- demais panels... -->

<script>
// ====================== MOTOR DE ABAS CORRIGIDO ======================
function showTab(id) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  const el = document.getElementById(id);
  if (el) el.classList.add('active');
}

// ====================== CALENDÁRIO CORRIGIDO ======================
let currentDate = new Date();

const MESES = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];

function atualizarMes() {
  const el = document.getElementById("calMonth");
  if (el) el.innerText = MESES[currentDate.getMonth()] + " " + currentDate.getFullYear();
}

function nextMonth() {
  currentDate.setMonth(currentDate.getMonth() + 1);
  atualizarMes();
  if (typeof renderCalendar === "function") renderCalendar();
}

function prevMonth() {
  currentDate.setMonth(currentDate.getMonth() - 1);
  atualizarMes();
  if (typeof renderCalendar === "function") renderCalendar();
}

// ====================== INICIALIZAÇÃO ======================
window.addEventListener('load', function() {
  // Garante que a primeira aba esteja ativa
  const primeiraAba = document.getElementById('mod-financeiro');
  if (primeiraAba) primeiraAba.classList.add('active');

  atualizarMes();

  // Chama funções existentes do seu sistema
  if (typeof renderFinanceiro === "function") renderFinanceiro();
  if (typeof updateCalc === "function") updateCalc();
});

// ====================== SEU CÓDIGO ORIGINAL (cole aqui todo o JS antigo) ======================
// Inclua aqui todas as funções que já existiam: HIST_ORGANIZZE_TX, consultor IA, renderFinanceiro, updateCalc, salvarOrcamentoAtual, etc.

</script>
