<!DOCTYPE html>

    <title>OficinaOS — Limaprata Reparações Automotivas</title>

    <style>
        :root {
            --steel: #f8f6f3;
            --steel-card: #ffffff;
            --chrome: #1a0e04;
            --gold: #b8621a;
            --gold-light: #d4782a;
            --border: rgba(100,60,20,0.12);
            --border-gold: rgba(184,98,26,0.35);
            --muted: #4a2a0f;
        }

        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: 'Lato', sans-serif;
            background: #f8f6f3;
            color: #1a0e04;
        }

        body {
            display: flex;
            flex-direction: column;
            max-height: 100dvh;
        }

        .topbar {
            height: 60px;
            background: linear-gradient(180deg, #ffffff, #faf5ee);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 1.5rem;
            flex-shrink: 0;
            box-shadow: 0 2px 12px rgba(150,80,20,0.12);
            z-index: 20;
        }

        .nav-tabs {
            display: flex;
            gap: 0.4rem;
            padding: 0.6rem 1rem;
            background: #f8f6f3;
            border-bottom: 1px solid var(--border);
            overflow-x: auto;
            flex-shrink: 0;
        }

        .nav-tab {
            padding: 0.65rem 1.4rem;
            border-radius: 6px;
            cursor: pointer;
            white-space: nowrap;
            font-size: 0.9rem;
            color: var(--muted);
            background: none;
            border: 1px solid transparent;
            transition: all 0.2s;
        }

        .nav-tab.active {
            background: linear-gradient(135deg, rgba(184,98,26,0.15), rgba(200,80,20,0.08));
            border-color: var(--border-gold);
            color: var(--gold);
            font-weight: 700;
        }

        /* ====================== CORREÇÕES CRÍTICAS ====================== */
        .panel {
            display: none;
            flex: 1 1 auto;
            flex-direction: column;
            min-height: 0;
            overflow: hidden;
            background: #f8f6f3;
        }

        .panel.active {
            display: flex !important;
            flex-direction: column;
            flex: 1 1 auto;
            min-height: 0;
            overflow-y: auto;
        }

        .orc-right, .fin-summary {
            display: flex !important;
            flex-direction: column;
            min-width: 310px;
            overflow-y: auto;
        }

        input[type="range"] {
            width: 100%;
            height: 7px;
            background: #e0d8d0;
            accent-color: #b8621a;
            border-radius: 4px;
            outline: none;
            cursor: pointer;
        }

        .fin-body, .orc-layout {
            flex: 1;
            min-height: 0;
            overflow: auto;
        }

        .orc-layout {
            display: grid;
            grid-template-columns: 1fr 360px;
            height: 100%;
        }

        /* Estilos originais mantidos */
        * { margin:0; padding:0; box-sizing:border-box; }
        .kpi, .card, .tx-item, .mat-row, .conta-card, .meta-card { 
            background: #ffffff; 
            border: 1px solid var(--border); 
            border-radius: 8px; 
        }
    </style>
</head>

    <script>
        // ====================== MOTOR DE ABAS CORRIGIDO ======================
        function showTab(id) {
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            const el = document.getElementById(id);
            if (el) el.classList.add('active');
        }

        // ====================== CALENDÁRIO ======================
        let currentDate = new Date();
        const MESES = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];

        function atualizarMes() {
            const el = document.getElementById("calMonth");
            if (el) el.textContent = MESES[currentDate.getMonth()] + " " + currentDate.getFullYear();
        }

        function nextMonth() {
            currentDate.setMonth(currentDate.getMonth() + 1);
            atualizarMes();
            if (typeof renderCalendar === "function") renderCalendar();
        }

        function prevMonth() {
            currentDate.setMonth(currentDate.getMonth() - 1);
            atualizarMes();
            if (typeof renderCalendar === "function") renderCalendar();
        }

        // ====================== INICIALIZAÇÃO ======================
        window.addEventListener('load', () => {
            document.getElementById('mod-financeiro').classList.add('active');
            atualizarMes();

            if (typeof renderFinanceiro === "function") renderFinanceiro();
            if (typeof updateCalc === "function") updateCalc();
            if (typeof organizeOrcamentoSectionsSafe === "function") organizeOrcamentoSectionsSafe();
        });
    </script>
