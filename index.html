<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OficinaOS</title>

  <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>

<div class="sidebar">
  <button onclick="UI.show('dashboard')">Dashboard</button>
  <button onclick="UI.show('financeiro')">Financeiro</button>
  <button onclick="UI.show('agenda')">Agenda</button>
</div>

<div class="main">

  <div id="dashboard" class="panel active">
    <h1>Dashboard</h1>
    <div id="dashResumo" class="card"></div>
  </div>

  <div id="financeiro" class="panel">
    <h1>Financeiro</h1>

    <input id="desc" class="input" placeholder="Descrição">
    <input id="valor" class="input" type="number" placeholder="Valor">

    <button onclick="Financeiro.add()">Adicionar</button>

    <div id="listaFinanceiro"></div>
  </div>

  <div id="agenda" class="panel">
    <h1>Agenda</h1>

    <button onclick="Agenda.prev()">←</button>
    <span id="mesAtual"></span>
    <button onclick="Agenda.next()">→</button>

    <div id="calendario"></div>
  </div>

</div>

<script src="assets/js/store.js"></script>
<script src="assets/js/ui.js"></script>
<script src="assets/js/financeiro.js"></script>
<script src="assets/js/agenda.js"></script>
<script src="assets/js/render.js"></script>
<script src="assets/js/app.js"></script>

</body>
</html>
