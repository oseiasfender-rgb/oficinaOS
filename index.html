<script>
// ====================== MOTOR DE ABAS CORRIGIDO ======================
function showTab(id) {
    document.querySelectorAll('.panel').forEach(p => {
        p.classList.remove('active');
    });
    const el = document.getElementById(id);
    if (el) el.classList.add('active');
}

// ====================== CALENDÁRIO CORRIGIDO ======================
let currentDate = new Date();

const MESES = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];

function atualizarMes() {
    const el = document.getElementById("calMonth");
    if (el) {
        el.innerText = MESES[currentDate.getMonth()] + " " + currentDate.getFullYear();
    }
}

function nextMonth() {
    currentDate.setMonth(currentDate.getMonth() + 1);
    atualizarMes();
    if (typeof renderCalendar === "function") renderCalendar();
}

function prevMonth() {
    currentDate.setMonth(currentDate.getMonth() - 1);
    atualizarMes();
    if (typeof renderCalendar === "function") renderCalendar();
}

// ====================== RESUMO ORÇAMENTO + MARGENS ======================
function getOrcValues() {
    const hours = parseFloat(document.getElementById('hours')?.value) || 0;
    const rate  = parseFloat(document.getElementById('hourRate')?.value) || 0;
    const margin = parseFloat(document.getElementById('marginSlider')?.value || 30) / 100;
    const disc   = parseFloat(document.getElementById('discSlider')?.value || 0) / 100;

    const labor = hours * rate;
    const mats = (typeof getMatsTotal === 'function') ? getMatsTotal() : 0;
    const pecas = (typeof getPecasTotal === 'function') ? getPecasTotal() : 0;
    const terc = (typeof getTercTotal === 'function') ? getTercTotal() : 0;
    const frete = (typeof getFreteTotal === 'function') ? getFreteTotal() : 0;

    const base = labor + mats + pecas + terc + frete;
    const comMargem = base / (1 - margin);
    const final = comMargem * (1 - disc);

    return {
        minimo: Math.round(base * 0.85),
        ideal: Math.round(final),
        premium: Math.round(final * 1.22),
        margem20: Math.round(margin * 100),
        margem30: Math.round(margin * 100 + 8),
        margem50: Math.round(margin * 100 + 25)
    };
}

function atualizarResumoOrcamento() {
    const v = getOrcValues();
    if (document.getElementById('orc-total-min')) document.getElementById('orc-total-min').textContent = 'R$ ' + v.minimo.toLocaleString('pt-BR');
    if (document.getElementById('orc-total-ideal')) document.getElementById('orc-total-ideal').textContent = 'R$ ' + v.ideal.toLocaleString('pt-BR');
    if (document.getElementById('orc-total-premium')) document.getElementById('orc-total-premium').textContent = 'R$ ' + v.premium.toLocaleString('pt-BR');
}

// ====================== SALVAR ORÇAMENTO ======================
window.salvarOrcamentoAtual = function() {
    const orc = {
        id: 'orc_' + Date.now(),
        data: new Date().toISOString().slice(0,10),
        cliente: document.getElementById('clientName')?.value || 'Sem nome',
        veiculo: document.getElementById('vehicle')?.value || '',
        total: getOrcValues().ideal,
        margem: parseFloat(document.getElementById('marginSlider')?.value) || 30,
        status: 'Salvo',
        prioridade: document.getElementById('orcPrioridade')?.value || 'normal'
    };

    window.orcHistorico = window.orcHistorico || [];
    window.orcHistorico.unshift(orc);
    localStorage.setItem('orcHistorico', JSON.stringify(window.orcHistorico));

    if (typeof showToast === 'function') showToast('✅ Orçamento salvo com sucesso!');
    if (typeof renderHistOrc === 'function') renderHistOrc();
};

// ====================== INICIALIZAÇÃO ======================
window.addEventListener('load', function() {
    showTab('mod-financeiro');
    atualizarMes();
    setTimeout(() => {
        atualizarResumoOrcamento();
        if (typeof updateCalc === 'function') updateCalc();
    }, 600);

    console.log("%c✅ OficinaOS Fase 3 - Correções críticas aplicadas com sucesso", "color:#b8621a; font-weight:bold");
});
</script>
