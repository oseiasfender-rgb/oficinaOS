
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>OficinaOS — Limaprata Reparações Automotivas</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cinzel:wght@700;900&family=DM+Serif+Display&family=DM+Mono:wght@400;500&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">

<style>
:root {
  /* ── CORES E VARIÁVEIS DE BI ── */
  --steel:        #f8f6f3;
  --steel-mid:    #ffffff;
  --coal:         #1a1a1a;
  --gold:         #b8621a;
  --gold-light:  #d4782a;
  
  /* Indicadores de Rentabilidade */
  --profit-high:  #16a34a; /* Verde: > 30% */
  --profit-mid:   #eab308; /* Amarelo: 15-30% */
  --profit-low:   #dc2626; /* Vermelho: < 15% */
  
  --border:      rgba(100,60,20,0.12);
  --border-gold: rgba(184,98,26,0.35);
}

/* ── ESTILOS GERAIS ── */
body { font-family: 'Lato', sans-serif; background: var(--steel); margin: 0; overflow-x: hidden; }
.badge-profit { padding: 4px 10px; border-radius: 12px; font-size: 0.75rem; font-weight: bold; color: white; text-transform: uppercase; }
.high { background: var(--profit-high); }
.mid { background: var(--profit-mid); }
.low { background: var(--profit-low); }

/* UI RESPONSIVA PARA MOBILE */
@media (max-width: 768px) {
  .orc-layout, .fin-body { grid-template-columns: 1fr !important; }
  .nav-tabs { overflow-x: auto; white-space: nowrap; }
}

/* CAMPO DE API KEY PROTEGIDO */
.api-key-wrapper { position: relative; display: flex; align-items: center; width: 100%; }
.api-key-wrapper input { width: 100%; padding-right: 40px; }
.btn-toggle-view { position: absolute; right: 10px; background: none; border: none; cursor: pointer; }

/* ... (Demais estilos do sistema original mantidos) ... */
</style>
</head>
<body>

<header class="topbar">
  <div class="brand">
    <div class="brand-logo">LP</div>
    <div>
      <h1 class="brand-name">OFICINAOS</h1>
      <span class="brand-sub">LIMAPRATA REPARAÇÕES</span>
    </div>
  </div>
  <nav class="nav-tabs">
    <button class="nav-tab active" onclick="showPanel('orcamento')">💰 Orçamentos</button>
    <button class="nav-tab" onclick="showPanel('financeiro')">📊 Financeiro</button>
    <button class="nav-tab" onclick="showPanel('consultor')">🤖 IA Consultor</button>
  </nav>
  <div id="cloudStatus" onclick="abrirBackup()">Sincronizando...</div>
</header>

<div id="mod-orcamento" class="panel active">
  <div class="orc-layout">
    <section class="orc-left">
      <div class="card">
        <h3>Dados do Veículo & Materiais</h3>
        <div class="form-grid">
          <input type="text" id="vehicle" placeholder="Ex: Corolla Prata">
          <input type="number" id="laborPrice" placeholder="Valor Mão de Obra (R$)" oninput="updateBI()">
        </div>
        <div id="matsList">
          </div>
        <button class="btn-add-mat" onclick="addMatRow()">+ Adicionar Material</button>
      </div>
    </section>

    <aside class="orc-right">
      <div class="price-hero">
        <span class="price-lbl">TOTAL ESTIMADO</span>
        <div id="finalPrice" class="price-big">R$ 0,00</div>
      </div>
      <div class="marg-sec">
        <div class="marg-lbl">
          <span>MARGEM LÍQUIDA</span>
          <span id="margPct">0%</span>
        </div>
        <div class="marg-bar"><div id="margFill" class="marg-fill"></div></div>
      </div>
      <div class="orc-actions">
        <button class="btn-primary" onclick="salvarOrcamento()">💾 Salvar Orçamento</button>
      </div>
    </aside>
  </div>
</div>

<div id="mod-consultor" class="panel">
  <div id="ia-key-bar" style="padding: 1rem; background: #fff8f0; border-bottom: 1px solid var(--border);">
    <label style="font-size: 0.7rem; color: #555;">CHAVE API ANTHROPIC:</label>
    <div class="api-key-wrapper">
      <input id="ia-api-key-input" type="password" placeholder="sk-ant-api..." 
             oninput="localStorage.setItem('lp_api_key', this.value)">
      <button class="btn-toggle-view" onclick="toggleKeyVisibility()">👁️</button>
    </div>
  </div>
  <div id="chatBox" style="flex:1; overflow-y:auto; padding: 20px;">
    </div>
</div>

<script>
// --- CORE: MOTOR DE BI E CÁLCULOS ---
function updateBI() {
    const labor = parseFloat(document.getElementById('laborPrice').value) || 0;
    const mats = Array.from(document.querySelectorAll('.mat-val')).reduce((acc, el) => acc + (parseFloat(el.value) || 0), 0);
    const total = labor + mats;
    
    // BI: Cálculo de Margem (Considerando que Materiais são custo direto)
    const margin = total > 0 ? ((labor / total) * 100) : 0;
    
    // UI Update
    document.getElementById('finalPrice').innerText = total.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
    document.getElementById('margPct').innerText = margin.toFixed(1) + '%';
    
    // Indicador Visual (Regra de Negócio: Verde > 30%)
    const fill = document.getElementById('margFill');
    fill.style.width = Math.min(margin, 100) + '%';
    if (margin > 30) fill.style.background = 'var(--profit-high)';
    else if (margin >= 15) fill.style.background = 'var(--profit-mid)';
    else fill.style.background = 'var(--profit-low)';
}

// --- SEGURANÇA: VISIBILIDADE DA CHAVE ---
function toggleKeyVisibility() {
    const input = document.getElementById('ia-api-key-input');
    input.type = input.type === 'password' ? 'text' : 'password';
}

// --- PERFORMANCE: SINCRONIZAÇÃO OTIMIZADA ---
let _syncDebounce;
function syncData() {
    document.getElementById('cloudStatus').innerText = '⟳ Salvando...';
    clearTimeout(_syncDebounce);
    _syncDebounce = setTimeout(() => {
        // Lógica de Backup (Firebase ou Local)
        localStorage.setItem('oficina_data', JSON.stringify({ /* data */ }));
        document.getElementById('cloudStatus').innerText = '✓ Sincronizado';
    }, 4000); // 4s de delay para não sobrecarregar
}

// --- INICIALIZAÇÃO ---
function addMatRow() {
    const div = document.createElement('div');
    div.className = 'mat-row';
    div.innerHTML = `<input type="text" placeholder="Material"> <input type="number" class="mat-val" placeholder="R$" oninput="updateBI()">`;
    document.getElementById('matsList').appendChild(div);
}

function showPanel(p) {
    document.querySelectorAll('.panel').forEach(el => el.classList.remove('active'));
    document.getElementById('mod-' + p).classList.add('active');
}

// Carregar chave salva
document.getElementById('ia-api-key-input').value = localStorage.getItem('lp_api_key') || '';
</script>

</body>
</html>
